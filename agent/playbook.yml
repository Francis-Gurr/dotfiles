- name: Configure shared agent instructions & skills
  hosts: localhost
  vars:
    home: "{{ ansible_env.HOME }}"
  tasks:
    - name: Stow the canonical agent config to ~/.config/agent
      command: stow -d {{ home }}/.dotfiles -t {{ home }} agent

    - name: Point Claude Code global memory at the shared AGENTS.md
      file:
        src: "{{ home }}/.config/agent/AGENTS.md"
        dest: "{{ home }}/.claude/CLAUDE.md"
        state: link
        force: true

    - name: Point Claude Code skills at the shared skills
      file:
        src: "{{ home }}/.config/agent/skills"
        dest: "{{ home }}/.claude/skills"
        state: link
        force: true

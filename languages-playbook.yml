- name: Install and setup common languages
  hosts: localhost
  tasks:
    - name: Install Node.js, npm, go, gopls, python, python-pip, lua
      become: true
      package:
        name:
          - nodejs
          - npm
          - golang
          - gopls
          - python3
          - python3-pip
          - lua
          - luarocks
        state: present
        update_cache: yes

    - name: Install "pnpm" using npm
      become: true
      npm:
        name: pnpm
        global: yes
        state: present

    - name: Run pnpm setup
      shell: pnpm setup
      args:
        executable: /usr/bin/zsh
